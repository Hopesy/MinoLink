<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MinoLink Dashboard</title>
    <base href="/" />
    <link rel="stylesheet" href="_content/MinoLink.Web/css/app.css" />
    <script>
        // 启动前立即应用主题，避免闪烁
        (function() {
            var t = localStorage.getItem('mino-theme');
            if (t === 'dark') document.documentElement.setAttribute('data-theme', 'dark');
        })();
    </script>
</head>
<body>
    <div id="app">正在加载...</div>
    <script src="_framework/blazor.webview.js"></script>
    <script>
        window.minoTheme = {
            isDark: function() {
                return document.documentElement.getAttribute('data-theme') === 'dark';
            },
            toggle: function(dark) {
                if (dark) {
                    document.documentElement.setAttribute('data-theme', 'dark');
                    localStorage.setItem('mino-theme', 'dark');
                } else {
                    document.documentElement.removeAttribute('data-theme');
                    localStorage.setItem('mino-theme', 'light');
                }
            }
        };
    </script>
</body>
</html>
